name: Drago Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (for manual runs)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build release bundle (Linux)
    runs-on: ubuntu-latest
    env:
      THAGORE_REF: main
      DRAGO_COLOR: never
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 21 runtime (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget lsb-release gnupg software-properties-common cmake ninja-build git libffi-dev libxml2-dev zlib1g-dev
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21
          echo "LD_LIBRARY_PATH=/usr/lib/llvm-21/lib:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
        shell: bash

      - name: Build thagc from source (main)
        run: |
          chmod +x .github/scripts/build_thagc_from_source.sh
          .github/scripts/build_thagc_from_source.sh "${THAGORE_REF}"
        shell: bash

      - name: Build binary
        run: |
          thagc build src/main.tg -o drago.bin
          mkdir -p dist
          tar -czf "dist/drago-${GITHUB_REF_NAME}-linux-${{ runner.arch }}.tar.gz" drago.bin README.md
        shell: bash

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-${{ runner.arch }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Resolve release tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag || '' }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: dist/*
          generate_release_notes: true
