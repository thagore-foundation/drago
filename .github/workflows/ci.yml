name: Drago CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test (Linux)
    runs-on: ubuntu-latest
    env:
      THAGC_TAG: v0.8.4
      DRAGO_COLOR: never
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 21 runtime (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget lsb-release gnupg software-properties-common
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21
          echo "LD_LIBRARY_PATH=/usr/lib/llvm-21/lib:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
        shell: bash

      - name: Install thagc (release)
        run: |
          chmod +x .github/scripts/install_thagc_posix.sh
          .github/scripts/install_thagc_posix.sh "${THAGC_TAG}" stable
        shell: bash

      - name: Verify toolchain
        run: thagc --version

      - name: Build drago
        run: thagc build src/main.tg -o drago.bin
        shell: bash

      - name: Smoke test
        run: |
          ./drago.bin check
          ./drago.bin test
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: drago-linux-${{ runner.arch }}
          path: drago.bin
          if-no-files-found: error
