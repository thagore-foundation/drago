name: Drago CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test (${{ matrix.platform }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.optional || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux
            arch: x86_64
            bin_name: drago.bin
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: aarch64
            bin_name: drago.bin
          - runner: macos-14
            platform: macos
            arch: aarch64
            bin_name: drago.bin
          - runner: windows-2022
            platform: windows
            arch: x86_64
            bin_name: drago.exe
          - runner: windows-11-arm
            platform: windows
            arch: aarch64
            bin_name: drago.exe
    env:
      THAGC_TAG: v0.9.6
      DRAGO_COLOR: never
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 21 runtime (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y wget lsb-release gnupg software-properties-common
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21
          sudo apt-get install -y libsqlite3-dev
          echo "LD_LIBRARY_PATH=/usr/lib/llvm-21/lib:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
        shell: bash

      - name: Install LLVM 21 runtime (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@21
          LLVM_PREFIX="$(brew --prefix llvm@21)"
          echo "${LLVM_PREFIX}/bin" >> "$GITHUB_PATH"
          echo "DYLD_LIBRARY_PATH=${LLVM_PREFIX}/lib:${DYLD_LIBRARY_PATH}" >> "$GITHUB_ENV"
        shell: bash

      - name: Install thagc (POSIX)
        if: runner.os != 'Windows'
        run: |
          chmod +x .github/scripts/install_thagc_posix.sh
          .github/scripts/install_thagc_posix.sh "${THAGC_TAG}" indev "${{ matrix.arch }}"
        shell: bash

      - name: Install LLVM 21 runtime (Windows)
        if: runner.os == 'Windows'
        run: choco install llvm --version=21.1.8 -y --no-progress
        shell: pwsh

      - name: Configure MSVC library paths (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archDir = if ("${{ matrix.arch }}" -eq "aarch64") { "arm64" } else { "x64" }

          $vsRoot = "C:\Program Files\Microsoft Visual Studio\2022"
          $edition = Get-ChildItem -Path $vsRoot -Directory -ErrorAction SilentlyContinue |
            Where-Object { Test-Path (Join-Path $_.FullName "VC\Tools\MSVC") } |
            Select-Object -First 1
          if (-not $edition) {
            throw "MSVC toolchain not found under $vsRoot"
          }

          $msvcVersion = Get-ChildItem -Path (Join-Path $edition.FullName "VC\Tools\MSVC") -Directory |
            Sort-Object Name -Descending |
            Select-Object -First 1
          if (-not $msvcVersion) {
            throw "MSVC version directory not found"
          }

          $msvcLib = Join-Path $msvcVersion.FullName "lib\$archDir"
          if (-not (Test-Path $msvcLib)) {
            throw "MSVC lib path not found: $msvcLib"
          }

          $kitsRoot = "C:\Program Files (x86)\Windows Kits\10\Lib"
          $kitVersion = Get-ChildItem -Path $kitsRoot -Directory |
            Where-Object { $_.Name -match '^\d+\.\d+\.\d+\.\d+$' } |
            Sort-Object Name -Descending |
            Select-Object -First 1
          if (-not $kitVersion) {
            throw "Windows Kits lib directory not found"
          }

          $ucrtLib = Join-Path $kitVersion.FullName "ucrt\$archDir"
          $umLib = Join-Path $kitVersion.FullName "um\$archDir"
          if (-not (Test-Path $ucrtLib)) { throw "UCRT lib path not found: $ucrtLib" }
          if (-not (Test-Path $umLib)) { throw "Windows UM lib path not found: $umLib" }

          "LIB=$msvcLib;$ucrtLib;$umLib;$env:LIB" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "LIBPATH=$msvcLib;$ucrtLib;$umLib;$env:LIBPATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          $legacyDiaLibDir = "C:\Program Files (x86)\Microsoft Visual Studio\2019\Professional\DIA SDK\lib\amd64"
          $legacyDiaLib = Join-Path $legacyDiaLibDir "diaguids.lib"
          if (-not (Test-Path $legacyDiaLib)) {
            $diaCandidates = @(
              "C:\Program Files\Microsoft Visual Studio\2022\Community\DIA SDK\lib\amd64\diaguids.lib",
              "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\DIA SDK\lib\amd64\diaguids.lib",
              "C:\Program Files\Microsoft Visual Studio\2022\Professional\DIA SDK\lib\amd64\diaguids.lib",
              "C:\Program Files\Microsoft Visual Studio\2022\BuildTools\DIA SDK\lib\amd64\diaguids.lib"
            )
            $diaSource = $diaCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
            if ($diaSource) {
              New-Item -ItemType Directory -Path $legacyDiaLibDir -Force | Out-Null
              Copy-Item -Path $diaSource -Destination $legacyDiaLib -Force
            }
          }

      - name: Install thagc (Windows)
        if: runner.os == 'Windows'
        run: .github/scripts/install_thagc_windows.ps1 -Tag "${{ env.THAGC_TAG }}" -Channel indev -Arch "${{ matrix.arch }}"
        shell: pwsh

      - name: Verify toolchain
        run: thagc --version

      - name: Build drago (POSIX)
        if: runner.os != 'Windows'
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            thagc build src/main.tg -o "${{ matrix.bin_name }}" \
              --link-lib=sqlite3 \
              --link-lib=c++ \
              --link-lib=c++abi
          else
            thagc build src/main.tg -o "${{ matrix.bin_name }}" --link-lib=sqlite3
          fi
        shell: bash

      - name: Build drago (Windows)
        if: runner.os == 'Windows'
        run: |
          $targetTriple = if ("${{ matrix.arch }}" -eq "aarch64") { "aarch64-pc-windows-msvc" } else { "x86_64-pc-windows-msvc" }
          thagc build src/main.tg -o "${{ matrix.bin_name }}" `
            --target $targetTriple `
            --link-lib=msvcprtd `
            --link-lib=ucrtd `
            --link-lib=vcruntimed `
            --link-lib=msvcrtd `
            --link-lib=kernel32 `
            --link-lib=user32 `
            --link-lib=advapi32 `
            --link-lib=shell32 `
            --link-lib=ws2_32 `
            --link-lib=iphlpapi `
            --link-lib=bcrypt `
            --link-lib=legacy_stdio_definitions
        shell: pwsh

      - name: Smoke test (POSIX)
        if: runner.os != 'Windows'
        run: |
          ./"${{ matrix.bin_name }}" check
          ./"${{ matrix.bin_name }}" test
        shell: bash

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: |
          .\${{ matrix.bin_name }} check
          .\${{ matrix.bin_name }} test
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: drago-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ matrix.bin_name }}
          if-no-files-found: error
