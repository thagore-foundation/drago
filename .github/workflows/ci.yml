name: Drago CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test (${{ matrix.platform }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.optional || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux
            arch: x86_64
            bin_name: drago.bin
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: aarch64
            bin_name: drago.bin
          - runner: macos-13
            platform: macos
            arch: x86_64
            bin_name: drago.bin
            optional: true
          - runner: macos-14
            platform: macos
            arch: aarch64
            bin_name: drago.bin
          - runner: windows-2022
            platform: windows
            arch: x86_64
            bin_name: drago.exe
          - runner: windows-11-arm
            platform: windows
            arch: aarch64
            bin_name: drago.exe
    env:
      THAGC_TAG: v1.0.0
      DRAGO_COLOR: never
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 21 runtime (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y wget lsb-release gnupg software-properties-common
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21
          echo "LD_LIBRARY_PATH=/usr/lib/llvm-21/lib:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
        shell: bash

      - name: Install LLVM 21 runtime (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@21
          LLVM_PREFIX="$(brew --prefix llvm@21)"
          echo "${LLVM_PREFIX}/bin" >> "$GITHUB_PATH"
          echo "DYLD_LIBRARY_PATH=${LLVM_PREFIX}/lib:${DYLD_LIBRARY_PATH}" >> "$GITHUB_ENV"
        shell: bash

      - name: Install thagc (POSIX)
        if: runner.os != 'Windows'
        run: |
          chmod +x .github/scripts/install_thagc_posix.sh
          .github/scripts/install_thagc_posix.sh "${THAGC_TAG}" stable "${{ matrix.arch }}"
        shell: bash

      - name: Install LLVM 21 runtime (Windows)
        if: runner.os == 'Windows'
        run: choco install llvm --version=21.1.8 -y --no-progress
        shell: pwsh

      - name: Install thagc (Windows)
        if: runner.os == 'Windows'
        run: .github/scripts/install_thagc_windows.ps1 -Tag "${{ env.THAGC_TAG }}" -Channel stable -Arch "${{ matrix.arch }}"
        shell: pwsh

      - name: Verify toolchain
        run: thagc --version

      - name: Build drago (POSIX)
        if: runner.os != 'Windows'
        run: thagc build src/main.tg -o "${{ matrix.bin_name }}"
        shell: bash

      - name: Build drago (Windows)
        if: runner.os == 'Windows'
        run: thagc build src/main.tg -o "${{ matrix.bin_name }}"
        shell: pwsh

      - name: Smoke test (POSIX)
        if: runner.os != 'Windows'
        run: |
          ./"${{ matrix.bin_name }}" check
          ./"${{ matrix.bin_name }}" test
        shell: bash

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: |
          .\${{ matrix.bin_name }} check
          .\${{ matrix.bin_name }} test
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: drago-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ matrix.bin_name }}
          if-no-files-found: error
